<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/membersetting.css">
        <script defer type="module" src="/static/js/membsetting-controller.js"></script>
        <title>My Eats Map</title>
    </head>
    <body>
        <div class="loading-container">
            <div class="load-animation"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-title">My Eats Map</div>
                <button class="navbar-btn">會員中心</button>
            </div>
        </nav>

        <div class="content-container">
            <div class="secondblock">
                <div class="setting-info">
                    <div class="setting-user">
                        <div class="user-info-container">
                            <div class="setting-user-title">用戶資訊</div>
                        </div>
                        <div class="user-info-container">
                            <div class="user-info-rows">
                                <div class="user-info-l2">
                                    <div class="item-title">帳號</div>
                                    <div class="email-view"></div>
                                </div>
                                <div class="user-info-l2">
                                    <div class="item-title">姓名</div>
                                    <input type="text" class="name-view">
                                </div>
                            </div>
                        </div>
                        <div class="user-info-container">
                            <div class="user-info-rows">
                                <div class="user-info-l2">
                                    <div class="item-title">暱稱</div>
                                    <input type="text" class="nickname-view">
                                </div>
                            </div>
                        </div>
                        
                        <div class="user-info-container">
                            <button type="button" class="save-user-info">儲存改變</button>
                        </div>
                    </div>
                    <div class="setting-update">
                        <div class="user-info-container">
                            <div class="update-title">密碼資訊</div>
                        </div>
                        
                        <div class="user-info-container">
                            <div class="user-update-pw">
                                <div class="user-pw-rows">
                                    <div class="user-info-l2">
                                        <div class="item-title">原密碼</div>
                                        <input type="password" class="old-pw">
                                    </div>
                                    <div class="user-info-l2">
                                        <div></div>
                                        <button type="button" class="update-pw-btn">更新密碼</button>
                                    </div>
                                </div>

                                <div class="user-info-rows">
                                    <div class="user-info-l2">
                                        <div class="item-title">新密碼</div>
                                        <input type="password" class="new-pw">
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>  
                          
                    <div class="logout-container">
                        <div class="logout-btn">登出</div>
                    </div>
                </div>
            </div>

            <footer class="footbar">
                COPY RIGHT 2026
            </footer>
        </div>
    </body>
</html>
