<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/static/css/membersetting.css">
        <script defer type="module" src="/static/js/membsetting-controller.js"></script>
        <title>美食地圖</title>
    </head>
    <body>
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-title">My Eats Map</div>
                <button class="navbar-btn">會員中心</button>
            </div>
        </nav>

        <div class="content-container">
            <div class="secondblock">
                <div class="setting-info">
                    <div class="setting-user">
                        <div class="user-info-container">
                            <div class="setting-user-title">用戶資訊</div>
                        </div>
                        <div class="user-info-container">
                            <div class="user-info-rows">
                                <div class="user-info-l2">
                                    <div class="item-title">帳號</div>
                                    <div class="email-view"></div>
                                </div>
                                <div class="user-info-l2">
                                    <div class="item-title">姓名</div>
                                    <input type="text">
                                </div>
                            </div>
                        </div>
                        <div class="user-info-container">
                            <div class="user-info-rows">
                                <div class="user-info-l2">
                                    <div class="item-title">暱稱</div>
                                    <input type="text">
                                </div>
                            </div>
                        </div>
                        <div class="user-info-container">
                            <div class="user-info-rows">
                                <div class="user-info-l2">
                                    <div class="item-title">追蹤者</div>
                                    <div class="item-tracker">
                                        <button type="button" class="tracker-select">追蹤的用戶</button>
                                        <div class=".tracker-droplist">
                                            <!-- <ul class="tracker-option">
                                                <li class="option">haha</li>
                                                <li class="option">paggy</li>
                                                <li class="option">IU</li>
                                                <li class="option">qb</li>
                                            </ul> -->
                                        </div>
                                    </div>
                                </div>
                                <div class="user-info-l2">
                                    <div class="item-title">粉絲</div>
                                    <div class="item-fans">
                                        <button type="button" class="fans-select">用戶的粉絲</button>
                                        <div class="fans-droplist">
                                            <!-- <ul class="fans-option">
                                                <li class="option">haha</li>
                                                <li class="option">paggy</li>
                                                <li class="option">IU</li>
                                                <li class="option">qb</li>
                                            </ul> -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="user-info-container">
                            <button type="button" class="save-user-info">儲存改變</button>
                        </div>
                    </div>
                    <div class="setting-update">
                        <div class="user-info-container">
                            <div class="update-title">密碼資訊</div>
                        </div>
                        
                        <div class="user-info-container">
                            <div class="user-info-rows">
                                <div class="user-info-l2">
                                    <div class="item-title">密碼</div>
                                    <input type="text">
                                </div>
                                <div class="user-info-l2">
                                    <div></div>
                                    <button type="button" class="update-pw-btn">更新密碼</button>
                                </div>
                            </div>
                        </div>
                    </div>  
                          
                    <div class="logout-container">
                        <div class="logout-btn">登出</div>
                    </div>
                </div>
            </div>

            <footer class="footbar">
                COPY RIGHT 2026
            </footer>
        </div>
    </body>
</html>
