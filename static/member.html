<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/member.css">
        <link rel="stylesheet" href="/static/css/selectheadshot.css">
        <link rel="stylesheet" href="/static/css/postsdialog.css">
        <link rel="stylesheet" href="/static/css//singlepostdialog.css">
        <script defer type="module" src="/static/js/member-controller.js"></script>
        <title>My Eats Map</title>
    </head>
    <body>
        <div class="loading-container">
            <div class="load-animation"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-title">My Eats Map</div>
                <button class="navbar-setting">
                    <img src="/static/img/settingBtn.png">
                </button>
            </div>
        </nav>

        <div class="content-container">
            <div class="secondblock">
                <div class="member-info">
                    <div class="member-one">
                        <div class="member-headshot">
                            <div class="headshot-container">
                                <div class="headshot-img">
                                    <img class="headshot-item-img" src="/static/img/user.png">
                                </div>
                                <button type="button" class="change-img-btn">變更大頭照</button>
                            </div>
                        </div>

                        <div class="member-name">
                            <div class="name-info-container">
                                <div class="info-container">
                                    <div class="name-view"></div>
                                </div>
                                
                                <div class="people-number">
                                    <div class="people-number-container">
                                        <div class="tracker-number">
                                            <div class="tracker-title">追蹤者</div>
                                            <div class="tracker-number-info">0</div>
                                        </div>
                                        <div class="fans-number">
                                            <div class="fans-title">粉絲</div>
                                            <div class="fans-number-info">0</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div  class="member-two">
                        <div class="switch-container">
                            <div class="post-btn active">發文</div>
                            <div class="post-collect-btn">收藏</div>
                        </div>
                        <div  class="posts-content">
                            <div class="posts-content-container" id="post-eachone-container">
                                
                            </div>

                            <div class="collect-content-hidden"  id="collect-eachone-container">
                               
                               
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="footbar">
                COPY RIGHT 2026
            </footer>
        </div>
        
        <dialog class="view-select-headshot">
            <nav class="nav">
                <div class="close-btn">
                    <img src="/static/img/close.png">
                </div>
            </nav>
            <div class="select-headshot-container">
                <div class="headshot-block">
                    <div class="view-img">
                        <img src="/static/img/user.png" class="preview-img">
                    </div>

                    <div class="select-img">
                        <input type="file" id="image-upload" class="upload-btn" accept="image/*">
                        <label for="image-upload" class="add-img">
                            <img src="/static/img/add-image.png">
                        </label>
                    </div>

                    <div class="btn-block">
                        <button type="button" class="submit-btn">確認</button>
                        <button type="button" class="cancel-btn">取消</button>
                    </div>
                </div>
            </div>
        </dialog>

        <dialog class="view-one-post">
            <nav class="nav-post">
                <div class="close-post-btn">
                    <img src="/static/img/close.png">
                </div>
            </nav>
            <div class="posts-container">
                <div class="post-content-container">
                    <div class="post-content-img">
                        <div class="content-img-container">
                            <div class="food-img-info">
                                <div class="img-info-scroll">
                                    <div class="imgSlides" id="imgItem">
                                        <div class="img-container">
                                            <img src="/static/img/photo.png">
                                        </div>
                                    </div>
                            
                                    <div class="food-info">
                                        <div class="food-info-container">
                                            <div class="img-name"></div>
                                            <div class="img-price"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="sildeBtn">
                                <button type="button" class="leftBtn" id="slideLeft"><img src="/static/img/left-button.png"></button>
                                <button type="button" class="rightBtn" id="slideRight"><img src="/static/img/right-button.png"></button>
                            </div>
                        </div>

                        <div class="post-evaluate-action">
                            <div class="love-btn">
                                <img src="/static/img/heart-nocolor.png" data-like="no" id="like-btn">
                                <div class="like-count">0</div>
                            </div>

                            <div class="collect-btn">
                                <img src="/static/img/bookmark-nocolor.png" data-collect="no" id="favorite-btn">
                                <div class="collect-count">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="post-content-comment">
                        <div class="user-info">
                            <div class="user-headshot">
                                <img src="/static/img/user.png" class="post-user-headshot">
                            </div>
                            <div class="user-nickname">user</div>
                        </div>
                        <div class="post-comment">
                            <div class="store-name-add">
                                <div class="obj-title">店家名稱</div>
                                <p class="store-name"></p>
                            </div>

                            <div class="food-experience">
                                <div class="obj-title">食物體驗</div>
                                <p class="experience-text"></p>
                            </div>
                            
                            <div class="dining-area">
                                <div class="obj-title">用餐環境</div>
                                <p class="area-text"></p>
                            </div>   
                        </div>
                    </div>
                </div>
            </div>
        </dialog>
    </body>
</html>
