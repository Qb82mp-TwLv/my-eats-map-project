<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/postcomment.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script defer type="module" src="/static/js/postcomment-controller.js"></script>
        <title>My Eats Map</title>
    </head>
    <body>
        <div class="loading-container">
            <div class="load-animation"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-title">My Eats Map</div>
                <button class="navbar-btn">會員中心</button>
            </div>
        </nav>

        <div class="content-container">
            <div class="secondblock">
                <div class="post-block-container">

                    <div class="post-img-container">
                        <div class="img-slide-container">
                            <div class="preview-img-slide">
                                
                            </div>

                            <div class="sildeBtn">
                                <button type="button" class="leftBtn" id="slideLeft"><img src="/static/img/left-button.png"></button>
                                <button type="button" class="rightBtn" id="slideRight"><img src="/static/img/right-button.png"></button>
                            </div>
                        </div>
                        
                        <div class="upload-img-file">
                            <input type="file" id="image-upload" class="upload-img-btn" multiple accept="image/*">
                            <label for="image-upload" class="add-img">
                                <img src="/static/img/add-image.png">
                            </label>
                        </div>
                        <div class="remark-str">注意:請一次上傳所需圖片，勿上傳超過7張，謝謝。</div>
                    </div>
                    <div class="post-input-container">
                        <div class="store-address">
                            <input type="text" class="search-address" placeholder="📍(搜尋店家位置:例如「台北市 鼎泰豐」)">
                            <div class="name-address-text">店家資訊：</div>
                            
                        </div>

                        <div class="store-position-type">
                            <div class="country-info">
                                    <div class="rest-name-title">地區(必選)</div>
                                    <div class="item-country">
                                        <button type="button" class="country-select">選擇地區</button>
                                        <div class="country-droplist">
                                            <ul class="country-option">

                                            </ul>
                                        </div>
                                    </div>
                            </div>

                            <div class="city-info">
                                    <div class="rest-name-title">城市(必選)</div>
                                    <div class="item-city">
                                        <button type="button" class="city-select">選擇城市</button>
                                        <div class="city-droplist">
                                            <ul class="city-option">

                                            </ul>
                                        </div>
                                    </div>
                            </div>
                            
                            <div class="type-info">
                                    <div class="rest-name-title">餐廳種類(必選)</div>
                                    <div class="item-type">
                                        <button type="button" class="type-select">選擇種類</button>
                                        <div class="type-droplist">
                                            <ul class="type-option">
                                                
                                            </ul>
                                        </div>
                                    </div>
                            </div>
                        </div>

                        <div class="food-experience-container">
                            <div class="experience-comment">
                                <div class="rest-name-title">餐點評價</div>
                                <textarea type="text" class="comment-info" maxlength="500" placeholder="最多500個字(必填)"></textarea>
                            </div>
                        </div>

                        <div class="dining-area-container">
                            <div class="dining-area-comment">
                                <div class="rest-name-title">用餐環境</div>
                                <textarea type="text" class="dining-area-info" maxlength="255" placeholder="最多255個字"></textarea>
                            </div>
                        </div>

                        <div class="submit-container">
                            <button type="button" class="submit-btn">送出</button>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="footbar">
                COPY RIGHT 2026
            </footer>
        </div>
    </body>
</html>
